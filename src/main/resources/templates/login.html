<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="card">
    <h2>Login</h2>

    <!-- SUGESTÃO: Mover a mensagem de erro para cá -->
    <div th:if="${erro != null}" th:text="${erro}" class="alert-error"></div>

    <form method="post" th:action="@{/logar}">
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" name="email" placeholder="Digite seu e-mail" required>
        </div>

        <div class="form-group">
            <label>Senha</label>
            <input type="password" name="senha" placeholder="Digite sua senha" required>
        </div>

        <button type="submit">Entrar</button>
    </form>

    <div class="link">
        <a th:href="@{/cadastroUsuario}">Registrar-se</a>
    </div>
</div>

</body>
</html>
